spec:
  inputs:
    application:
      type: string
      description: "Application name (e.g., retirementCalculator)"
    
    packageType:
      type: string
      default: "build"
      options:
        - "build"
        - "release"
      description: "Type of package - build or release"
    
    packageReference:
      type: string
      description: "Package Reference - describing the origin of the package. For release packages the release name (e.g., rel-2.6.0), for preliminary packages the branch reference."
    
    buildId:
      type: string
      description: "Build ID from the original build pipeline (e.g., 12247)"
    
    targetEnvironment:
      type: string
      default: "EOLEB7-Integration"
      options:
        - "EOLEB7-Integration"
        - "EOLEB7-Acceptance"
        - "EOLEB7-Production"
      description: "Target environment for deployment"

---

variables:
  GIT_STRATEGY: none
  GIT_CHECKOUT: "false"
 
  # Note: has to be similar to the CBS configuration
  wdEvidencePath: "deploy/evidences/evidence.yaml"
  wdEvidenceReport: "deploy/report/deployment-report.html"

  # Evidence directories
  wdEvidencesRoot: /var/work/wazi_deploy_evidences_gitlab/
  wdEvidencesIndex: /var/work/wazi_deploy_evidences_gitlab_index/
  
  # Working directory on USS (using buildId from pipeline vars)
  uniqueWorkspaceId: $PIPELINE_WORKSPACE/$CI_PROJECT_NAME/deploy-${CI_PIPELINE_ID}
  
  # Working directory on Linux
  deployOutputDirectory: ${CI_PROJECT_DIR}/DEPLOY-OUTPUT
  
  verbose: "-v"
  
  # Assign inputs to variables for easier reference in scripts
  application: $[[ inputs.application ]]
  packageType: $[[ inputs.packageType ]]
  packageReference: $[[ inputs.packageReference ]]
  buildId: $[[ inputs.buildId ]]
  targetEnvironment: $[[ inputs.targetEnvironment ]]
  
# Only run on manual/web triggers
workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"

stages:
  - Validate
  - Generate Plan
  - Deploy
  - Report
  - Cleanup

# Validate input parameters
Validate Parameters:
  stage: Validate
  tags: [shell]
  script: |
    echo "========================================="
    echo "Deployment Pipeline Parameters"
    echo "========================================="
    echo "[INFO] Application: ${application}"
    echo "[INFO] Package Type: ${packageType}"
    echo "[INFO] Package Reference: ${packageReference}"
    echo "[INFO] Build ID: ${buildId}"
    echo ""
    echo "[INFO] Target Environment: ${targetEnvironment}"
    echo ""
    echo "[INFO] Workspace: ${uniqueWorkspaceId}"
    echo "========================================="
    
    VALIDATION_FAILED=0
    
    
    if [ -z "${application}" ]; then
      echo "[ERROR] application is required"
      VALIDATION_FAILED=1
    fi
    
    if [ -z "${buildId}" ]; then
      echo "[ERROR] buildId is required"
      VALIDATION_FAILED=1
    fi
    
  
    # Validate packageType value
    if [ "${packageType}" != "build" ] && [ "${packageType}" != "release" ]; then
      echo "[ERROR] packageType must be either 'build' or 'release', got: ${packageType}"
      VALIDATION_FAILED=1
    fi
      
    # Check if any validation failed
    if [ ${VALIDATION_FAILED} -eq 1 ]; then
      echo "========================================="
      echo "[ERROR] Validation failed. Please fix the errors above."
      echo "========================================="
      exit 1
    fi
    echo "========================================="
    echo "[SUCCESS] All validations passed"
    echo "========================================="

Generate Deployment Plan:
  stage: Generate Plan
  tags: [shell]
  needs: ["Validate Parameters"]
  script: |
    echo "[INFO] Generating deployment plan for ${targetEnvironment} environment"
    echo "[INFO] for package:"
    echo "[INFO] Package Type: ${packageType}"
    echo "[INFO] Package Reference: ${packageReference}"
    echo "[INFO] Build ID: ${buildId}"
      
    zowe rse issue unix-shell ". ~/.bash_profile && wazideploy-generate.sh -w ${uniqueWorkspaceId} -a ${application} -P ${packageType} -R ${packageReference} -I ${buildId}" \
        --user ${RSEAPI_USER} \
        --password ${RSEAPI_PASSWORD} \
        --cwd ${RSEAPI_WORKING_DIRECTORY}
    
    RC=$?
    if [ ${RC} -eq 0 ]; then
      echo "[INFO] Deployment plan generation passed"
    else
      echo "[ERROR] Deployment plan generation failed. Exit code: ${RC}"
      exit ${RC}
    fi

# Deploy to target environment
Deploy Application:
  stage: Deploy
  tags: [shell]
  needs: ["Generate Deployment Plan"]
  script: |
    echo "[INFO] Deploying to ${targetEnvironment} environment"

    wdEnvironmentFile="${targetEnvironment}.yml"

    # echo "[INFO] Using environment file: ${wdEnvironmentFile}"
    echo "[INFO] Evidence path: ${wdEvidencePath}"
    
    # Execute deployment
    zowe rse issue unix-shell ". ~/.bash_profile && wazideploy-deploy.sh -w ${uniqueWorkspaceId} -a ${application} -e ${wdEnvironmentFile} -l ${wdEvidencePath} < /dev/null" --user ${RSEAPI_USER} --password ${RSEAPI_PASSWORD} --cwd ${RSEAPI_WORKING_DIRECTORY}
    
    RC=$?
    if [ ${RC} -eq 0 ]; then
      echo "[INFO] Deployment to ${targetEnvironment} passed"
    else
      echo "[ERROR] Deployment to ${targetEnvironment} failed. Exit code: ${RC}"
      exit ${RC}
    fi

# Generate and publish deployment report
Generate Deployment Report:
  stage: Report
  tags: [shell]
  needs: ["Deploy Application"]  
  rules:
    - when: always
  variables:
    reportDir: ${deployOutputDirectory}/deploy-${targetEnvironment}
  artifacts:
    name: "${targetEnvironment}-deployment-report-${buildId}"
    when: always
    paths:
      - "${deployOutputDirectory}/deploy-${targetEnvironment}/deployment-report.html"
      - "${deployOutputDirectory}/deploy-${targetEnvironment}/evidence.yaml"
  script: |
    echo "[INFO] Generating deployment report for ${targetEnvironment}"
    
    deploymentReportFile="${uniqueWorkspaceId}/deployPkgDir/${wdEvidenceReport}"
    deploymentEvidenceFile="${uniqueWorkspaceId}/deployPkgDir/${wdEvidencePath}"
    wdEvidencesDir="${wdEvidencesRoot}/${application}/${targetEnvironment}"
    
    # Generate evidence
    zowe rse issue unix-shell ". ~/.bash_profile && mkdir -p ${uniqueWorkspaceId}/deployPkgDir/deploy/report && wazideploy-evidence.sh -w ${uniqueWorkspaceId} -l ${wdEvidencePath} -o ${wdEvidenceReport}" --user ${RSEAPI_USER} --password ${RSEAPI_PASSWORD}  --cwd ${RSEAPI_WORKING_DIRECTORY}
    
    RC=$?
    if [ ${RC} -ne 0 ]; then
      echo "[ERROR] Failed to generate deployment evidence. Exit code: ${RC}"
      exit ${RC}
    fi
    
    echo "[INFO] Generated deployment evidence"
    
    # Create report directory
    if [ ! -d "${deployOutputDirectory}/" ]; then
      mkdir ${deployOutputDirectory}
    fi
    
    mkdir -p "${reportDir}"
    echo "[INFO] Using report directory: ${reportDir}"
    
    # Download deployment report
    echo "[INFO] Downloading deployment report from ${deploymentReportFile}"
    zowe rse dl uf "${deploymentReportFile}" -f "${reportDir}/deployment-report.html" -b  --user ${RSEAPI_USER} --password ${RSEAPI_PASSWORD}
    
    RC=$?
    if [ ${RC} -eq 0 ]; then
        echo [INFO] Loaded deployment report file.
    else
        echo [ERROR] Failed to load deployment report. Exit code: ${RC}.
        exit ${RC}
    fi
    
    # Download evidence file
    echo "[INFO] Downloading evidence report from ${deploymentEvidenceFile}"
    zowe rse dl uf "${deploymentEvidenceFile}" -f "${reportDir}/evidence.yaml" -b  --user ${RSEAPI_USER} --password ${RSEAPI_PASSWORD}
    
    RC=$?
    if [ ${RC} -eq 0 ]; then
        echo [INFO] Loaded deployment evidence file.
    else
        echo [ERROR] Failed to load deployment evidence file. Exit code: ${RC}.
        exit ${RC}
    fi
    
    echo "[INFO] Published deployment report"
    
    # Persist evidence for Wazi Deploy indexing
    mkdir -p $wdEvidencesDir
    mkdir -p $wdEvidencesIndex
    
    cp ${reportDir}/evidence.yaml $wdEvidencesDir/evidence-${CI_PIPELINE_ID}.yaml
    echo "[INFO] Persisted evidence file at $wdEvidencesDir"
    
    # Update Wazi Deploy index
    wazideploy-evidence --index $wdEvidencesIndex --dataFolder $wdEvidencesRoot i
    RC=$?
    
    if [ ${RC} -eq 0 ]; then
      echo "[INFO] Updated Wazi Deploy index"
    else
      echo "[WARNING] Failed to update Wazi Deploy index"
      exit ${RC}
    fi

# Cleanup workspace
Cleanup:
    stage: Cleanup
    tags: [shell]
    variables:
      FF_ENABLE_JOB_CLEANUP: 1
    script: |
            zowe rse issue unix-shell ". ~/.bash_profile && deleteWorkspace.sh -w ${uniqueWorkspaceId}" --user ${RSEAPI_USER} --password ${RSEAPI_PASSWORD} --cwd ${RSEAPI_WORKING_DIRECTORY}
            RC=$?
            if [ ${RC} -eq 0 ]; then
                echo [INFO] Cleanup job passed.
            else
                echo [ERROR] Cleanup job failed. Exit code: ${RC}.
                exit ${RC}
            fi

